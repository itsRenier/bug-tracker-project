<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Issue | Bug Tracker</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="../index.html">🐞 BugTracker</a>
      <div>
        <a href="../index.html" class="btn btn-secondary">Back to Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h2>Create New Issue</h2>
    <form id="issueForm" class="mt-4 needs-validation" novalidate>
      <div class="mb-3">
        <label for="summary" class="form-label">Summary <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="summary" required />
        <div class="invalid-feedback">Summary is required.</div>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
        <textarea class="form-control" id="description" rows="4" required></textarea>
        <div class="invalid-feedback">Description is required.</div>
      </div>

      <div class="mb-3">
        <label for="identifiedBy" class="form-label">Identified By <span class="text-danger">*</span></label>
        <select class="form-select" id="identifiedBy" required></select>
        <div class="invalid-feedback">Please select who identified the issue.</div>
      </div>

      <div class="mb-3">
        <label for="dateIdentified" class="form-label">Date Identified <span class="text-danger">*</span></label>
        <input type="date" class="form-control" id="dateIdentified" required />
        <div class="invalid-feedback">Date is required.</div>
      </div>

      <div class="mb-3">
        <label for="project" class="form-label">Project <span class="text-danger">*</span></label>
        <select class="form-select" id="project" required></select>
        <div class="invalid-feedback">Please select a project.</div>
      </div>

      <div class="mb-3">
        <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
        <select class="form-select" id="status" required>
          <option value="">Select Status</option>
          <option value="open">Open</option>
          <option value="resolved">Resolved</option>
          <option value="overdue">Overdue</option>
        </select>
        <div class="invalid-feedback">Status is required.</div>
      </div>

      <div class="mb-3">
        <label for="priority" class="form-label">Priority <span class="text-danger">*</span></label>
        <select class="form-select" id="priority" required>
          <option value="">Select Priority</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <div class="invalid-feedback">Priority is required.</div>
      </div>

      <div class="mb-3">
        <label for="assignedTo" class="form-label">Assigned To <span class="text-danger">*</span></label>
        <select class="form-select" id="assignedTo" required></select>
        <div class="invalid-feedback">Please assign this issue to someone.</div>
      </div>

      <div class="mb-3">
        <label for="targetResolution" class="form-label">Target Resolution Date <span class="text-danger">*</span></label>
        <input type="date" class="form-control" id="targetResolution" required />
        <div class="invalid-feedback">Target date is required.</div>
      </div>

      <div class="mb-3">
        <label for="actualResolution" class="form-label">Actual Resolution Date</label>
        <input type="date" class="form-control" id="actualResolution" />
      </div>

      <div class="mb-3">
        <label for="resolutionSummary" class="form-label">Resolution Summary</label>
        <textarea class="form-control" id="resolutionSummary" rows="3"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Save Issue</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script> <script src="../js/issue-management.js"></script>
</body>
</html>
