<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People | BugTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">🐞 BugTracker</a>
            <div class="d-flex gap-2">
                <a href="../index.html" class="btn btn-sm btn-secondary">Back to Dashboard</a>
                <button id="logout-btn" class="btn btn-sm btn-outline-secondary text-white border-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 class="page-title mb-1">People Management</h2>
        <p class="page-sub mb-4">Add and view team members who can be assigned to issues.</p>

        <div class="section-card">
            <h5 class="fw-bold mb-3">Add New Team Member</h5>
            <form id="form-person">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="name" placeholder="e.g. Jane" required>
                    </div>
                    <div class="col-md-6">
                        <label for="surname" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="surname" placeholder="e.g. Doe" required>
                    </div>
                    <div class="col-md-5">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="jane@example.com" required>
                    </div>
                    <div class="col-md-5">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">@</span>
                            <input type="text" class="form-control" id="username" placeholder="janedoe" required>
                        </div>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>

        <h5 class="fw-bold mb-3">Current Roster</h5>
        <div id="person-list"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/data-management.js"></script>

</body>
</html>
