<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Management | Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">🐞 BugTracker</a>
            <div>
                <a href="../index.html" class="btn btn-secondary btn-sm fw-bold">Back to Dashboard</a>
                <button id="logout-btn" class="btn btn-outline-danger btn-sm fw-bold ms-2">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 class="page-title mb-1">People Management</h2>
        <p class="page-sub mb-4">Add and view team members who can be assigned to issues.</p>

        <div class="section-card shadow-sm mb-4 border-0">
            <h5 class="fw-bold mb-3 text-dark">Add New Team Member</h5>
            <form id="personForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label small fw-semibold text-muted">First Name</label>
                        <input type="text" class="form-control" id="name" placeholder="e.g. Jane" required>
                    </div>
                    <div class="col-md-6">
                        <label for="surname" class="form-label small fw-semibold text-muted">Last Name</label>
                        <input type="text" class="form-control" id="surname" placeholder="e.g. Doe" required>
                    </div>
                    <div class="col-md-5">
                        <label for="email" class="form-label small fw-semibold text-muted">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="jane@example.com" required>
                    </div>
                    <div class="col-md-5">
                        <label for="username" class="form-label small fw-semibold text-muted">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0">@</span>
                            <input type="text" class="form-control border-start-0 pl-0" id="username" placeholder="janedoe" required>
                        </div>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Add</button>
                    </div>
                </div>
            </form>
        </div>

        <h5 class="fw-bold text-dark mb-3 mt-5">Current Roster</h5>
        <div id="peopleList"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/data-management.js"></script>

</body>
</html>
