<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | BugTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">🐞 BugTracker</a>
            <div class="d-flex gap-2">
                <a href="../index.html" class="btn btn-sm btn-secondary">Back to Dashboard</a>
                <button id="logout-btn" class="btn btn-sm btn-outline-secondary text-white border-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 class="page-title mb-1">Project Management</h2>
        <p class="page-sub mb-4">Create and view projects that issues can be linked to.</p>

        <div class="section-card">
            <h5 class="fw-bold mb-3">Create New Project</h5>
            <form id="form-project">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="projectName" class="form-label">Project Name</label>
                        <input type="text" class="form-control" id="projectName" placeholder="e.g. Mobile App V2" required>
                    </div>
                    <div class="col-md-6">
                        <label for="projectDescription" class="form-label">Short Description</label>
                        <input type="text" class="form-control" id="projectDescription" placeholder="What is this project about?" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>

        <h5 class="fw-bold mb-3">Active Projects</h5>
        <div id="project-list"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/data-management.js"></script>

</body>
</html>
