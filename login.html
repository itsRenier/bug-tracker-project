<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BugTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">🐞</div>
        <h1 class="login-title">BugTracker</h1>
        <p class="login-sub">Admin portal — sign in to continue</p>

        <div class="alert-error" id="login-error">Incorrect username or password.</div>

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="admin" autocomplete="username">
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary w-100" id="login-btn">Sign In</button>
    </div>
</div>

<script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    document.getElementById('login-btn').addEventListener('click', function () {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('login-error');

        if (username === ADMIN_USER && password === ADMIN_PASS) {
            localStorage.setItem('bt_auth', 'true');
            window.location.href = 'index.html';
        } else {
            errorBox.style.display = 'block';
        }
    });

    document.getElementById('password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    if (localStorage.getItem('bt_auth') === 'true') {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
