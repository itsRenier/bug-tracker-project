<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BugTracker</title>

    <!-- Bootstrap 5 CSS CDN — provides form styling, buttons, and utility classes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom stylesheet — styles the login card, wrapper, and error alert -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== LOGIN PAGE WRAPPER ===== -->
<!-- Full-page centered container — uses CSS to vertically and horizontally center the card -->
<div class="login-wrapper">

    <!-- Login card — the white box containing the logo, form fields, and sign-in button -->
    <div class="login-card">

        <!-- App logo and branding -->
        <div class="login-logo">🐞</div>
        <h1 class="login-title">BugTracker</h1>
        <p class="login-sub">Admin portal — sign in to continue</p>

        <!-- Error alert — hidden by default, shown via JavaScript if credentials are incorrect -->
        <div class="alert-error" id="login-error">Incorrect username or password.</div>

        <!-- Username input field -->
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <!-- autocomplete="username" hints the browser to suggest saved usernames -->
            <input type="text" class="form-control" id="username" placeholder="admin" autocomplete="username">
        </div>

        <!-- Password input field -->
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <!-- autocomplete="current-password" hints the browser to suggest saved passwords -->
            <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <!-- Submit button — triggers the login validation logic in the script below -->
        <button class="btn btn-primary w-100" id="login-btn">Sign In</button>

    </div>
</div>
<!-- ===== END LOGIN PAGE WRAPPER ===== -->


<!-- ===== LOGIN AUTHENTICATION SCRIPT ===== -->
<script>
    /* Hardcoded admin credentials used to validate the login form.
       In a production app, authentication would be handled server-side. */
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    /* Sign In button click handler — validates the entered credentials.
       On success: sets an auth flag in localStorage and redirects to the dashboard.
       On failure: reveals the error alert message. */
    document.getElementById('login-btn').addEventListener('click', function () {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('login-error');

        if (username === ADMIN_USER && password === ADMIN_PASS) {
            /* Store auth state in localStorage so other pages can verify the user is logged in */
            localStorage.setItem('bt_auth', 'true');
            window.location.href = 'index.html'; // Redirect to dashboard
        } else {
            errorBox.style.display = 'block'; // Show the error alert
        }
    });

    /* Keyboard shortcut — pressing Enter while in the password field triggers the Sign In button,
       so the user doesn't have to click manually */
    document.getElementById('password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    /* Session check — if the user is already logged in (auth flag exists in localStorage),
       skip the login page entirely and redirect straight to the dashboard */
    if (localStorage.getItem('bt_auth') === 'true') {
        window.location.href = 'index.html';
    }
</script>
<!-- ===== END LOGIN AUTHENTICATION SCRIPT ===== -->

</body>
</html>
