<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker | Dashboard</title>

    <!-- Bootstrap 5 CSS CDN — provides responsive grid, components, and utility classes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom stylesheet — overrides and extends Bootstrap with project-specific styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ===== NAVIGATION BAR ===== -->
    <!-- Responsive top nav using Bootstrap's navbar component.
         Collapses into a hamburger menu on smaller screens. -->
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">

            <!-- Brand/logo link — clicking returns user to the dashboard -->
            <a class="navbar-brand" href="index.html">🐞 BugTracker</a>

            <!-- Hamburger toggle button — only visible on mobile/tablet viewports -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#nav"
                    aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible nav links — hidden on small screens, shown on lg+ -->
            <div class="collapse navbar-collapse" id="nav">

                <!-- Primary navigation links -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/create-issue.html">Create Ticket</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/people-management.html">People</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/project-management.html">Projects</a></li>
                </ul>

                <!-- Logout button — triggers logout logic defined in app.js -->
                <button id="logout-btn" class="btn btn-outline-danger btn-sm fw-bold ms-2">Logout</button>
            </div>
        </div>
    </nav>
    <!-- ===== END NAVIGATION BAR ===== -->


    <!-- ===== MAIN CONTENT AREA ===== -->
    <div class="container">

        <!-- Page header row — title on the left, filter controls on the right -->
        <div class="row mb-4 align-items-center">

            <!-- Page title and subtitle -->
            <div class="col-md-6">
                <h2 class="page-title">Issue Dashboard</h2>
                <p class="page-sub">All recorded bugs and issues</p>
            </div>

            <!-- Filter and action controls -->
            <div class="col-md-6 text-md-end mt-3 mt-md-0">

                <!-- Dropdown to filter issues by status (All / Open / Resolved / Overdue).
                     The selected value is read by app.js to filter the rendered issue cards. -->
                <select class="form-select w-auto d-inline-block" id="filter-status">
                    <option value="all">All Statuses</option>
                    <option value="open">Open</option>
                    <option value="resolved">Resolved</option>
                    <option value="overdue">Overdue</option>
                </select>

                <!-- Shortcut button to the ticket creation page -->
                <a href="pages/create-issue.html" class="btn btn-primary ms-2">+ New Ticket</a>
            </div>
        </div>

        <!-- Issue list container — populated dynamically by app.js.
             Shows a loading placeholder until JavaScript fetches and renders the issues. -->
        <div class="row" id="issue-list">
            <div class="col-12 text-center text-muted py-5"><p>Loading issues...</p></div>
        </div>

    </div>
    <!-- ===== END MAIN CONTENT AREA ===== -->


    <!-- Bootstrap 5 JS bundle (includes Popper) — required for navbar toggle and other components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main application script — handles issue rendering, filtering, and logout -->
    <script src="js/app.js"></script>

</body>
</html>
