<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🐞 BugTracker</a>
            
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#nav"
                    aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/create-issue.html">Create Ticket</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/people-management.html">People</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/project-management.html">Projects</a></li>
                </ul>
                <button id="logout-btn" class="btn btn-outline-danger btn-sm fw-bold ms-2">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h2 class="page-title">Issue Dashboard</h2>
                <p class="page-sub">All recorded bugs and issues</p>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <select class="form-select w-auto d-inline-block" id="filter-status">
                    <option value="all">All Statuses</option>
                    <option value="open">Open</option>
                    <option value="resolved">Resolved</option>
                    <option value="overdue">Overdue</option>
                </select>
                <a href="pages/create-issue.html" class="btn btn-primary ms-2">+ New Ticket</a>
            </div>
        </div>

        <div class="row" id="issue-list">
            <div class="col-12 text-center text-muted py-5"><p>Loading issues...</p></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
